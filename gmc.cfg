[sound_system]
music={"type": "solo"}
effects={"type": "simultaneous", "simultaneous_sounds": 3, "default": true}
voice={"type": "sequential"}

[keyboard]
comma=["switch", "s_flipper_left"]
period=["switch", "s_flipper_right"]
1=["switch", "s_left_lane"]
8=["switch", "s_bumper_left"]
9=["switch", "s_bumper_right"]
enter=["switch", "s_start"]

# WCS
q=["switch", "s_star_1"]
w=["switch", "s_star_2"]
e=["switch", "s_star_3"]
r=["switch", "s_star_4"]
g=["switch", "s_goal"]

